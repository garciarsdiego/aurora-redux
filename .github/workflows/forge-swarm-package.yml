name: forge-swarm package

# Distinct from ci.yml / evals.yml / omniforge-next.yml: this workflow exists to
# produce distributable bundles of packages/omniforge-next from CI runners
# (macOS + Linux) — NOT from the Windows dev box. It runs the three mandatory
# package commands (typecheck / test / build), packs the bundle, and uploads it
# as a build artifact per OS.

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Allow manual triggering for testing

env:
  NODE_VERSION: 22
  PNPM_VERSION: 10.26.0

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # --- Three mandatory package commands ---
      - name: Typecheck
        run: pnpm --dir packages/omniforge-next typecheck

      # The package test suite imports @playwright/test for the client-shell
      # tests, so Chromium must be installed before running the tests.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm --dir packages/omniforge-next test

      - name: Build
        run: pnpm --dir packages/omniforge-next build

      # --- Package step: produce the distributable bundle (.tgz) ---
      - name: Package
        run: pnpm --dir packages/omniforge-next pack --pack-destination ./artifacts

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: omniforge-next-bundle-${{ matrix.os }}
          path: |
            packages/omniforge-next/artifacts/*.tgz
            packages/omniforge-next/dist
          if-no-files-found: error
